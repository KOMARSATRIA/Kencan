<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadiah Kelulusan SMK! [Bocil] </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-box">
            <img src="buket.png" alt="Ikon Hadiah" class="welcome-image">
            <h2>Selamat ya yang udah lulus nih, ku kasih hadiah!</h2>
            <p>Mau lihat hadiahnya?</p>
            <div class="welcome-buttons">
                <button id="btn-mau">Mau! 😍</button>
                <button id="btn-gak">Gak ah 😜</button>
            </div>
        </div>
    </div>

   <audio id="graduation-sound" src="msc2.mp3" loop></audio>

   <audio id="graduation-sound2" src="msc.mp3" loop></audio>


    <div class="card-container hidden-content">
        <div class="graduation-cap">🎓</div>
        <div class="photo-wrapper">
            <img src="foto.jpg" alt="Foto Kelulusan" class="profile-photo">
        </div>
        <h1>Happy Graduation!</h1>
        <h2 class="name">Rahma yurotun nisa</h2>
        <p class="school">SMK Capgawen</p>
        <div class="divider"></div>
        <p class="wishes">
           "Alhamdulillah. Barakallah fiik atas pencapaianmu. Semoga ilmu yang didapatkan berkah dan bermanfaat bagi banyak orang."
        </p>
        <button id="celebrate-btn">Rayakan! 🎉</button>
    </div>

    <div id="overlay-celebration" class="overlay hidden">
        <div class="overlay-content">
            <div class="overlay-photo-frame">
                <img src="true.webp" alt="Foto Kelulusan" class="overlay-photo">
            </div>
            <img src="buket.png" alt="Buket Bunga" class="overlay-bouquet">
            <h2 class="congrats-text">Bocil kita udah lulus nih, congratulation ya🎓👏</h2>
            <button id="close-overlay-btn">Tutup ❌</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
